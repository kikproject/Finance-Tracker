<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финтрекер</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form">
        <div>
            <h1>Создайте новый пароль</h1>
            <p class="textCentered textSize16px">Пароль должен содержать не менее 8 символов,<br>включать буквы и цифры.</p>
        </div>
            <form>
                <div class="passwordField">
                    <label for="password">Новый пароль <span class="warning">*</span></label><br>
                    <input type="password" id="password" name="password" class="passwordPadding" placeholder="••••••••">
                    <input type="checkbox" id="seePassword" class="toggle-checkbox">
                    <label for="togglePassword" class="toggle-label"><span class="eye-icon eye-open"></span></label>
                    <div class="error-message">Пожалуйста введите корректный пароль</div>
                </div>
                <div class="passwordField">
                    <label for="passwordRepeat">Повторите пароль <span class="warning">*</span></label><br>
                    <input type="password" id="passwordRepeat" name="passwordRepeat" class="passwordPadding" placeholder="••••••••">
                    <input type="checkbox" id="seePassword" class="toggle-checkbox">
                    <label for="togglePassword" class="toggle-label"><span class="eye-icon eye-open"></span></label>
                    <div class="error-message">Пароли не совпадают</div>
                </div>
            </form>
        <div>
            <button type="submit">Сохранить пароль</button>
            <p class="smallLabel textCentered"><a href="/signIn.html">Вернуться ко входу</a></p>
        </div>
    </div>
</body>
