<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финтрекер</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form">
        <h1>Вход</h1>
        <form>
            <div>
                <label for="login">Логин или электронная почта<span class="warning">*</span></label><br>
                <input type="text" id="login" name="login" placeholder="login">
                <div class="error-message">Пожалуйста, введите логин или электронную почту</div>
            </div>
            <div class="passwordField">
                <label for="password">Пароль <span class="warning">*</span></label><br>
                <input type="password" id="password" name="password" class="passwordPadding" placeholder="••••••••">
                <input type="checkbox" id="seePassword" class="toggle-checkbox">
                <label for="togglePassword" class="toggle-label"><span class="eye-icon eye-open"></span></label>
                <div class="error-message">Пожалуйста введите корректный пароль</div>
            </div>
            <div>
                <input type="checkbox" id="rememberMe" name="rememberMe" value="rememberMe">
                <label class="smallLabel" for="rememberMe">Запомнить меня</label>
            </div>
        </form>
        <div>
            <button type="submit">Сохранить пароль</button>
            <p class="smallLabel textCentered">Нет аккаунта? <a href="/signUp.html">Зарегистрироваться</a></p>
            <p class="smallLabel textCentered"><a href="/passwordRecovery.html">Забыли пароль?</a></p>
        </div>
    </div>
</body>
