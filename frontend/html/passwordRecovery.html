<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финтрекер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form">
        <div>
            <h1>Восстановление пароля</h1>
            <p class="textCentered textSize16px">Укажите адрес электронной почты, указанный<br>при регистрации, и мы пришлём ссылку для смены пароля.</p>
        </div>
        <form>
            <div>
                <label for="email">Электронная почта</label><br>
                <input type="email" id="email" name="email" placeholder="example@email.com">
                <div class="error-message">Введите корректный адрес электронной почты</div>
            </div>
        </form>
        <div>
            <button a href="#">Отправить ссылку</button>
            <p class="smallLabel textCentered"><a href="#">Вернуться ко входу</a></p>
        </div>
    </div>
</body>
